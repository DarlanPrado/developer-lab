services:
  traefik:
    image: traefik:v3.4
    container_name: developer-lab-traefik
    restart: unless-stopped
    ports:
      - "${TRAEFIK_HTTP_PORT:-80}:80"
      - "${TRAEFIK_HTTPS_PORT:-443}:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
    networks:
      - lab-shared

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: developer-lab-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PORT=3001
      - DB_FILE_NAME=/app/data/lab.db
      - DOCKER_SOCKET=/var/run/docker.sock
    volumes:
      - ./data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - lab-shared

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: developer-lab-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - PORT=3000
      - NUXT_API_URL=http://api:3001
      - NUXT_COOKIE_SECURE=${NUXT_COOKIE_SECURE:-false}
    networks:
      - lab-shared
    labels:
      - traefik.enable=true
      - traefik.http.routers.web.rule=Host(`${LAB_DOMAIN:-lab}`)
      - traefik.http.services.web.loadbalancer.server.port=3000

networks:
  lab-shared:
    name: lab-shared
    driver: bridge
